<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <filter id="noiseFilter">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.2"
      numOctaves="3"
      stitchTiles="stitch" />
    <feColorMatrix
      type="saturate"
      values="0.0" />
    <feColorMatrix
      type="matrix"
      values="0.05 0    0    0    0
              0    0.05 0    0    0
              0    0    0.05 0    0
              0    0    0    0.05 0" />
  </filter>

  <rect width="100%" height="100%" filter="url(#noiseFilter)" />

  <!--<rect width="100%" height="100%" stroke="black" fill="transparent" />-->
</svg>
